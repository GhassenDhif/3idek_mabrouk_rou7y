<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>عيدك مبارك</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "Playfair Display", serif;
      height: 100vh;
      padding: 10px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,215,160,0.14), transparent),
        radial-gradient(circle at 80% 80%, rgba(255,182,193,0.10), transparent),
        linear-gradient(135deg, #0f0c12, #1a141c, #120d15);
      color: #f7e9d7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .gold-glow {
      position: absolute;
      width: min(45vw, 400px);
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(255,215,120,0.24), transparent 70%);
      filter: blur(80px);
      animation: float 10s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    .gold-glow:nth-child(1) {
      top: -120px;
      right: -100px;
    }

    .gold-glow:nth-child(2) {
      bottom: -120px;
      left: -100px;
      animation-delay: -4s;
    }

    .sky, .fire-layer, .sparkler-layer, .ember-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(100%, 760px);
      max-height: calc(100vh - 20px);
      padding: clamp(16px, 3vw, 32px) clamp(14px, 3vw, 26px);
      border-radius: clamp(20px, 3vw, 28px);
      background: rgba(20, 15, 20, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,215,150,0.2);
      box-shadow:
        0 0 80px rgba(255,200,120,0.08),
        0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
      animation: fadeUp 1s ease;
      overflow: hidden;
    }

    .luxury-line {
      width: 60px;
      height: 2px;
      margin: 0 auto 18px;
      background: linear-gradient(90deg, transparent, #ffd58a, transparent);
    }

    h1 {
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1.2;
      letter-spacing: clamp(.5px, .4vw, 2px);
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ffd58a, #fff1c2, #ffd58a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      word-break: break-word;
    }

    .subtitle {
      font-size: clamp(.96rem, 3.5vw, 1.1rem);
      color: #d8c3a5;
      margin-bottom: 18px;
      line-height: 1.8;
    }

    .message {
      padding: clamp(14px, 3vw, 20px);
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,215,150,0.15);
      font-size: clamp(.92rem, 3.2vw, 1.02rem);
      line-height: 1.85;
      color: #f3d9b1;
      transition: .3s ease;
      word-break: break-word;
    }

    .buttons {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 14px 22px;
      min-height: 48px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: clamp(.9rem, 3.2vw, .95rem);
      transition: .3s ease;
      max-width: 100%;
    }

    .gold {
      background: linear-gradient(135deg, #ffd58a, #ffbf5f);
      color: #2b1d12;
      box-shadow: 0 8px 25px rgba(255,200,120,0.25);
    }

    .gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(255,200,120,0.35);
    }

    .outline {
      background: transparent;
      border: 1px solid rgba(255,215,150,0.3);
      color: #e8d2b0;
    }

    .outline:hover {
      background: rgba(255,215,150,0.1);
    }

    .music-note {
      margin-top: 10px;
      color: #cfb08a;
      font-size: clamp(.76rem, 2.8vw, .88rem);
      line-height: 1.6;
      word-break: break-word;
    }

    .footer {
      margin-top: 12px;
      font-size: clamp(.78rem, 2.8vw, .9rem);
      color: #a89278;
      line-height: 1.6;
    }

    .floating {
      position: absolute;
      bottom: -30px;
      font-size: 20px;
      animation: rise linear forwards;
      opacity: .8;
      pointer-events: none;
      z-index: 1;
    }

    .ember {
      position: absolute;
      bottom: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff2b0 0%, #ffb347 45%, rgba(255,120,0,0.1) 75%, transparent 100%);
      box-shadow: 0 0 12px rgba(255,180,71,.8);
      animation: emberRise linear forwards;
      opacity: .85;
    }

    .flame-wrap {
      position: fixed;
      bottom: 0;
      width: clamp(30px, 8vw, 90px);
      height: clamp(50px, 14vw, 140px);
      pointer-events: none;
      filter: drop-shadow(0 0 20px rgba(255,170,60,.2));
      z-index: 1;
    }

    .flame-wrap.left {
      left: max(4px, env(safe-area-inset-left));
    }

    .flame-wrap.right {
      right: max(4px, env(safe-area-inset-right));
      transform: scaleX(-1);
    }

    .flame-core, .flame-mid, .flame-outer {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50% 50% 40% 40% / 65% 65% 35% 35%;
      animation: flameFlicker 1.5s ease-in-out infinite;
    }

    .flame-outer {
      width: 78%;
      height: 78%;
      background: radial-gradient(circle at 50% 75%, rgba(255,250,190,.2), rgba(255,160,20,.85) 45%, rgba(255,80,0,.5) 70%, transparent 75%);
      filter: blur(1px);
    }

    .flame-mid {
      width: 52%;
      height: 58%;
      background: radial-gradient(circle at 50% 75%, rgba(255,255,215,.7), #ffc04d 42%, rgba(255,125,10,.75) 72%, transparent 78%);
      animation-delay: -.3s;
    }

    .flame-core {
      width: 27%;
      height: 37%;
      background: radial-gradient(circle at 50% 75%, #fffde8 5%, #fff2a8 35%, rgba(255,200,90,.9) 70%, transparent 80%);
      animation-delay: -.55s;
    }

    .sparkler {
      position: fixed;
      bottom: 90px;
      width: 4px;
      height: clamp(70px, 14vw, 110px);
      background: linear-gradient(to top, #8c8c8c, #d8d8d8);
      border-radius: 4px;
      transform-origin: bottom center;
      pointer-events: none;
      z-index: 1;
    }

    .sparkler.left {
      left: 44px;
      transform: rotate(-16deg);
    }

    .sparkler.right {
      right: 44px;
      transform: rotate(16deg);
    }

    .sparkler-head {
      position: absolute;
      top: -4px;
      left: 50%;
      width: 12px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, #fff8d8, #ffd36b 45%, rgba(255,160,20,.2) 70%, transparent 75%);
      box-shadow: 0 0 20px rgba(255,211,107,.9);
      animation: sparklePulse 1s ease-in-out infinite;
    }

    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, #fffef2 0%, #ffe08c 45%, #ffb54f 70%, transparent 75%);
      box-shadow: 0 0 10px rgba(255,208,100,.9);
      animation: sparkFly linear forwards;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes rise {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-110vh); opacity: 0; }
    }

    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(20px,30px); }
    }

    @keyframes emberRise {
      0% { transform: translateY(0) scale(.8); opacity: 0; }
      12% { opacity: .95; }
      100% { transform: translateY(-55vh) translateX(var(--drift, 0px)) scale(1.4); opacity: 0; }
    }

    @keyframes flameFlicker {
      0%, 100% { transform: translateX(-50%) scaleY(1) scaleX(1); }
      25% { transform: translateX(-50%) scaleY(1.08) scaleX(.95); }
      50% { transform: translateX(-50%) scaleY(.92) scaleX(1.06); }
      75% { transform: translateX(-50%) scaleY(1.1) scaleX(.98); }
    }

    @keyframes sparklePulse {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: .9; }
      50% { transform: translateX(-50%) scale(1.25); opacity: 1; }
    }

    @keyframes sparkFly {
      0% { transform: translate(0,0) scale(.7); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) scale(1.05); opacity: 0; }
    }

    @media (max-width: 700px) {
      .buttons {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      button {
        width: 100%;
        padding: 12px 18px;
        min-height: 42px;
      }

      .sparkler.left { left: 16px; }
      .sparkler.right { right: 16px; }

      h1 {
        font-size: clamp(1.7rem, 6vw, 2.3rem);
        margin-bottom: 6px;
      }

      .subtitle {
        font-size: .9rem;
        line-height: 1.6;
        margin-bottom: 12px;
      }

      .message {
        font-size: .9rem;
        line-height: 1.7;
        padding: 14px;
      }

      .music-note,
      .footer {
        font-size: .75rem;
        line-height: 1.5;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 6px;
      }

      .card {
        padding: 14px 10px;
        border-radius: 16px;
        max-height: calc(100vh - 12px);
      }

      .luxury-line {
        margin-bottom: 10px;
      }

      .subtitle {
        margin-bottom: 10px;
      }

      .message {
        border-radius: 14px;
        padding: 12px;
        font-size: .85rem;
        line-height: 1.6;
      }

      .flame-wrap {
        width: 30px;
        height: 50px;
      }

      .sparkler {
        display: none;
      }

      .music-note {
        font-size: .72rem;
      }

      .footer {
        margin-top: 10px;
        font-size: .72rem;
      }
    }
  </style>
</head>
<body>

  <div class="gold-glow"></div>
  <div class="gold-glow"></div>
  <div class="sky"></div>
  <div class="ember-layer" id="emberLayer"></div>
  <div class="sparkler-layer" id="sparklerLayer"></div>
  <div class="fire-layer"></div>

  <div class="flame-wrap left">
    <div class="flame-outer"></div>
    <div class="flame-mid"></div>
    <div class="flame-core"></div>
  </div>

  <div class="flame-wrap right">
    <div class="flame-outer"></div>
    <div class="flame-mid"></div>
    <div class="flame-core"></div>
  </div>

  <div class="sparkler left">
    <div class="sparkler-head"></div>
  </div>
  <div class="sparkler right">
    <div class="sparkler-head"></div>
  </div>

  <div class="card">
    <div class="luxury-line"></div>

    <h1>عيدك مبارك يا حبيبي</h1>

    <p class="subtitle">
      هذه ليست مجرد تهنئة… هذه رسالة حب لك في هذا العيد ✨
    </p>

    <div class="message" id="msg">
      كل عام وأنت في قلبي، وقريب مني أكثر من أي وقت ❤️<br>
      عيدك عندي ليس مجرد يوم… بل فرحة لأنك أنت موجود في حياتي 💖
    </div>

    <div class="buttons">
      <button class="gold" onclick="newMsg()">رسالة فاخرة 💌</button>
      <button class="outline" onclick="luxuryEffect()">إضافة تأثير ✨</button>
      <button class="outline" onclick="toggleMusic()" id="musicBtn">تشغيل الموسيقى 🎵</button>
    </div>

    <div class="music-note">ضع ملف الموسيقى في نفس المجلد باسم: <strong>Mabrouk_laid.mp3</strong></div>
    <div class="footer">بكل الحب لك… دائمًا وأبدًا ❤️</div>
  </div>

  <audio id="bgMusic" loop>
    <source src="Mabrouk_laid.mp3" type="audio/mpeg">
  </audio>

  <script>
    const messages = [
      "كل عام وأنت حبي، وأجمل ما في أيامي 💖",
      "عيدك معي مختلف… لأنك أنت كل السعادة بالنسبة لي ✨",
      "وجودك في حياتي هو العيد الحقيقي… وكل عام وأنا أحبك أكثر ❤️",
      "أحبك في هذا العيد… وفي كل يوم… وفي كل لحظة 💕",
      "أنت ليس فقط شخص أحبه… أنت قلبي كله 💛"
    ];

    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');

    function newMsg() {
      const box = document.getElementById('msg');
      box.style.opacity = 0.3;
      setTimeout(() => {
        box.innerHTML = messages[Math.floor(Math.random() * messages.length)];
        box.style.opacity = 1;
      }, 200);
      spawnFloating(6);
      burstSparklers();
    }

    function luxuryEffect() {
      spawnFloating(20);
      burstSparklers();
    }

    function spawnFloating(n) {
      for (let i = 0; i < n; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'floating';
          el.innerHTML = Math.random() > 0.5 ? '✨' : '💛';
          el.style.left = Math.random() * 100 + 'vw';
          el.style.animationDuration = (5 + Math.random() * 5) + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 10000);
        }, i * 120);
      }
    }

    function spawnEmber(side) {
      const layer = document.getElementById('emberLayer');
      const el = document.createElement('div');
      el.className = 'ember';
      const base = side === 'left' ? 28 : window.innerWidth - 28;
      el.style.left = (base + (Math.random() * 32 - 16)) + 'px';
      el.style.setProperty('--drift', (Math.random() * 30 - 15) + 'px');
      el.style.animationDuration = (2.8 + Math.random() * 2.2) + 's';
      layer.appendChild(el);
      setTimeout(() => el.remove(), 5500);
    }

    function burstFromSparkler(x, y, amount = 18) {
      const layer = document.getElementById('sparklerLayer');
      for (let i = 0; i < amount; i++) {
        const s = document.createElement('div');
        s.className = 'spark';
        s.style.left = x + 'px';
        s.style.top = y + 'px';
        const angle = Math.random() * Math.PI * 2;
        const dist = 20 + Math.random() * 60;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        s.style.setProperty('--x', tx + 'px');
        s.style.setProperty('--y', ty + 'px');
        s.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
        layer.appendChild(s);
        setTimeout(() => s.remove(), 1700);
      }
    }

    function burstSparklers() {
      if (window.innerWidth <= 480) return;
      const leftX = window.innerWidth > 700 ? 46 : 22;
      const rightX = window.innerWidth > 700 ? window.innerWidth - 46 : window.innerWidth - 22;
      const y = window.innerHeight - (window.innerWidth > 700 ? 118 : 92);
      burstFromSparkler(leftX, y, 18);
      burstFromSparkler(rightX, y, 18);
    }

    function toggleMusic() {
      if (music.paused) {
        music.play().then(() => {
          musicBtn.textContent = 'إيقاف الموسيقى ⏸';
        }).catch(() => {
          musicBtn.textContent = 'اضغط مرة أخرى للموسيقى 🎵';
        });
      } else {
        music.pause();
        musicBtn.textContent = 'تشغيل الموسيقى 🎵';
      }
    }

    document.body.addEventListener('click', function initAudioOnce() {
      if (music.paused) {
        music.play().then(() => {
          musicBtn.textContent = 'إيقاف الموسيقى ⏸';
        }).catch(() => {});
      }
      document.body.removeEventListener('click', initAudioOnce);
    }, { once: true });

    setInterval(() => spawnFloating(2), 2200);
    setInterval(() => {
      spawnEmber('left');
      spawnEmber('right');
    }, 220);
    setInterval(burstSparklers, 1100);
  </script>

</body>
</html>
